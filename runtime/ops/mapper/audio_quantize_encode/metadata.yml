name: '量化编码与重采样'
name_en: 'Quantize Encode & Resample'
description: '将音频重采样到指定采样率，并量化编码为 8/16/24/32-bit PCM（WAV）。输出写入 export_path 并更新 filePath。'
description_en: 'Resample audio to target sample rate and encode as 8/16/24/32-bit PCM WAV. Writes output to export_path and updates filePath.'
language: 'python'
vendor: 'huawei'
raw_id: 'AudioQuantizeEncode'
version: '1.0.0'
types:
  - 'cleaning'
modal: 'audio'
inputs: 'audio'
outputs: 'audio'
settings:
  sampleRate:
    name: '采样率(Hz)'
    description: '目标采样率（Hz）。0 表示保持原采样率。'
    type: 'inputNumber'
    defaultVal: 16000
    min: 0
    max: 192000
    step: 1
  bitDepth:
    name: '位深(bit)'
    description: 'WAV PCM 位深：8/16/24/32。'
    type: 'select'
    defaultVal: '16'
    required: true
    options:
      - label: '8-bit PCM'
        value: '8'
      - label: '16-bit PCM'
        value: '16'
      - label: '24-bit PCM'
        value: '24'
      - label: '32-bit PCM'
        value: '32'
  channels:
    name: '声道数'
    description: '目标声道数：1=单声道，2=双声道，0=保持原声道。'
    type: 'inputNumber'
    defaultVal: 1
    min: 0
    max: 2
    step: 1
  overwrite:
    name: '覆盖输出'
    description: '若 export_path 下已存在同名文件，是否覆盖。'
    type: 'switch'
    defaultVal: 'false'
    required: false
    checkedLabel: '覆盖'
    unCheckedLabel: '不覆盖'
runtime:
  memory: 268435456
  cpu: 0.3
  gpu: 0
  npu: 0
  storage: 10MB

metrics:
  - name: '处理耗时'
    metric: '依输入音频长度与运行环境而定'
release:
  - '首次发布'
